name: Eval Quality Gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel in-flight runs on the same PR/branch to save costs
concurrency:
  group: eval-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    name: Run Evals (Tier 1+2)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      # --no-healthcheck disables the image's built-in HEALTHCHECK so GitHub
      # Actions doesn't wait for it to pass. We poll readiness ourselves below.
      chromadb:
        image: chromadb/chroma:latest
        ports:
          - 8000:8000
        options: --no-healthcheck

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # LLM providers
      ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
      OPENROUTER_API_KEY:   ${{ secrets.OPENROUTER_API_KEY }}
      TAVILY_API_KEY:       ${{ secrets.TAVILY_API_KEY }}

      # Services (match Docker service ports above)
      CHROMA_URL:           http://localhost:8000
      REDIS_URL:            redis://localhost:6379

      # Models — use same Haiku for both to keep cost low in CI
      MODEL_CHEAP:          claude-haiku-4-5-20251001
      MODEL_STRONG:         claude-haiku-4-5-20251001
      MODEL_EMBED:          openai/text-embedding-3-small

      # Eval config — Tiers 1+2 only; Tier 3 uses live web search (non-deterministic)
      EVAL_TIER_FILTER:     "1,2"
      EVAL_MIN_TIER1_PASS:  "4"
      EVAL_MIN_TIER2_PASS:  "3"
      EVAL_MIN_SCHEMA_PCT:  "85"

      # Disable features not needed for eval (saves time + cost)
      GUARDRAILS_ENABLED:        "false"
      SEMANTIC_CACHE_ENABLED:    "false"
      LANGSMITH_TRACING:         "false"

      # Misc
      NODE_ENV:             test
      PORT:                 3000
      LOG_LEVEL:            warn

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Wait for ChromaDB
        # Poll from the host using curl (ubuntu-latest always has it).
        # Retries for up to 60s — ChromaDB is Python-based and can be slow to start.
        run: |
          echo "Waiting for ChromaDB at http://localhost:8000/api/v2/heartbeat..."
          for i in $(seq 1 12); do
            if curl -sf http://localhost:8000/api/v2/heartbeat > /dev/null 2>&1; then
              echo "ChromaDB is ready (attempt $i)"
              exit 0
            fi
            echo "Not ready yet — attempt $i/12, retrying in 5s..."
            sleep 5
          done
          echo "ChromaDB did not become ready in time"
          exit 1

      - name: Seed corpus
        run: pnpm run seed

      - name: Run evaluation (Tier 1+2)
        id: eval
        run: pnpm run eval:ci

      - name: Generate summary report
        if: always()
        run: |
          SUMMARY_SCRIPT="$GITHUB_WORKSPACE/scripts/eval_summary.mjs"
          if [ -f "$SUMMARY_SCRIPT" ]; then
            node "$SUMMARY_SCRIPT"
          else
            echo "## ⚠️ Eval did not complete" >> "$GITHUB_STEP_SUMMARY"
            echo "Setup failed before eval could run. Check the logs above." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload eval artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results-${{ github.sha }}
          path: |
            eval_results.csv
            eval_meta.json
            eval_report.md
          if-no-files-found: warn
          retention-days: 30
